<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Tracker — CADTH Ottawa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #1b3330;
    --bg-dark:  #142926;
    --surface:  #1f3c38;
    --surface2: #264742;
    --border:   #2e5550;
    --olive:    #a8b832;
    --purple:   #7c6fbf;
    --yellow:   #d4cc3a;
    --green-nd: #5bbf7a;
    --blue-nd:  #4a6abf;
    --grey-blu: #8a9eaa;
    --white:    #ffffff;
    --offwhite: #e8eeec;
    --muted:    #7aada5;
    --red:      #e05555;
    --orange:   #e09030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }

  nav {
    background: var(--bg-dark);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .logo-svg { width: 52px; height: 40px; flex-shrink: 0; }
  .brand-text .rc { font-size: 1.05rem; font-weight: 700; color: var(--white); letter-spacing: 0.04em; }
  .nav-right { margin-left: auto; font-size: 0.72rem; color: var(--muted); text-align: right; letter-spacing: 0.06em; }
  .nav-right strong { color: var(--olive); display: block; font-size: 0.82rem; }

  .hero {
    background: var(--bg-dark);
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
    border-bottom: 3px solid var(--olive);
  }
  .hero::after { content:''; position:absolute; right:-40px; top:-20px; width:180px; height:180px; border-radius:50%; border:28px solid var(--grey-blu); opacity:0.18; }
  .hero::before { content:''; position:absolute; right:30px; top:10px; width:120px; height:120px; border-radius:50%; border:16px solid var(--olive); opacity:0.22; }
  .hero h2 { font-size:1.6rem; font-weight:700; line-height:1.1; margin-bottom:6px; position:relative; }
  .hero p { font-size:0.8rem; color:var(--muted); position:relative; font-weight:500; }

  /* Trip budget overview */
  .budget-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .day-budget {
    background: var(--surface);
    padding: 12px 14px;
    position: relative;
  }
  .day-budget .db-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 5px; }
  .day-budget .db-name  { font-size: 0.82rem; font-weight: 600; color: var(--white); margin-bottom: 6px; }
  .day-budget .db-spent { font-size: 0.78rem; font-weight: 700; margin-bottom: 3px; }
  .day-budget .db-remain { font-size: 0.68rem; color: var(--muted); }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 7px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .ok     { color: var(--olive); }
  .warn   { color: var(--orange); }
  .over   { color: var(--red); }
  .fill-ok   { background: var(--olive); }
  .fill-warn { background: var(--orange); }
  .fill-over { background: var(--red); }

  .summary {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  @media(min-width:480px) { .summary { grid-template-columns: repeat(4, 1fr); } }
  .stat { background: var(--surface); padding: 15px 18px; }
  .stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
  .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--olive); }

  .main { padding: 24px 18px; }
  .section-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th { text-align: left; padding: 10px 16px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border); font-weight: 600; }
  thead th:last-child { text-align: right; }
  thead th[data-sort] { cursor: pointer; user-select: none; transition: color 0.15s; }
  thead th[data-sort]:hover { color: var(--white); }
  .sort-ind { display: inline-block; margin-left: 4px; opacity: 0.35; font-size: 0.9em; transition: opacity 0.15s, color 0.15s; }
  thead th[data-sort].active { color: var(--white); }
  thead th[data-sort].active .sort-ind { opacity: 1; color: var(--olive); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(168,184,50,0.07); }
  tbody td { padding: 13px 16px; vertical-align: middle; }
  tbody tr.just-added { animation: justAdded 1.6s ease-out; }
  @keyframes justAdded {
    0%   { background: rgba(168,184,50,0.42); }
    60%  { background: rgba(168,184,50,0.25); }
    100% { background: transparent; }
  }

  .meal-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.55rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .meal-breakfast { background: rgba(91,191,122,0.18); color: var(--green-nd); }
  .meal-lunch     { background: rgba(168,184,50,0.18); color: var(--olive); }
  .meal-dinner    { background: rgba(124,111,191,0.2);  color: var(--purple); }
  .meal-snack     { background: rgba(138,158,170,0.2);  color: var(--grey-blu); }

  .cost { text-align: right; font-weight: 700; color: var(--offwhite); font-variant-numeric: tabular-nums; }
  .day-tag { font-size: 0.72rem; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .location { color: var(--muted); font-size: 0.77rem; }

  .total-row td { padding: 12px 16px; font-weight: 700; background: var(--surface2); color: var(--white); border-top: 2px solid var(--olive); font-size: 0.85rem; }
  .total-row .cost { color: var(--olive); font-size: 1.05rem; }

  .add-bar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
  .add-btn { background: var(--olive); color: var(--bg-dark); border: none; padding: 10px 18px; border-radius: 6px; font-family: inherit; font-weight: 700; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: opacity 0.15s, transform 0.05s; }
  .add-btn:hover, .add-btn:focus { opacity: 0.88; outline: none; }
  .add-btn:active { transform: translateY(1px); }
  .add-form {
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 10px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    padding: 0 16px;
    margin-bottom: 0;
    transition: max-height 0.32s ease, opacity 0.22s ease 0.05s, padding 0.32s ease, margin-bottom 0.32s ease, border-color 0.32s ease;
  }
  .add-form.open {
    max-height: 520px;
    opacity: 1;
    padding: 16px;
    margin-bottom: 14px;
    border-color: var(--border);
  }
  .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  @media(min-width:600px) { .form-grid { grid-template-columns: 1fr 1fr; } }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .form-field input, .form-field select { background: var(--bg-dark); color: var(--white); border: 1px solid var(--border); border-radius: 6px; padding: 9px 10px; font-family: inherit; font-size: 0.88rem; }
  .form-field input:focus, .form-field select:focus { outline: none; border-color: var(--olive); }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
  .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 9px 16px; border-radius: 6px; font-family: inherit; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; }
  .btn-secondary:hover { color: var(--white); border-color: var(--muted); }

  .node-footer { display: flex; align-items: center; padding: 20px 18px 8px; opacity: 0.5; }
  .nd { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .nl { flex: 1; height: 1px; background: var(--border); }
  footer { text-align: center; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em; padding-bottom: 24px; }
</style>
</head>
<body>

<nav>
  <svg class="logo-svg" viewBox="0 0 52 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="10" y1="20" x2="26" y2="6"  stroke="#a8b832" stroke-width="1.4" opacity="0.8"/>
    <line x1="10" y1="20" x2="26" y2="34" stroke="#a8b832" stroke-width="1.4" opacity="0.8"/>
    <line x1="26" y1="6"  x2="42" y2="20" stroke="#a8b832" stroke-width="1.4" opacity="0.8"/>
    <line x1="26" y1="34" x2="42" y2="20" stroke="#a8b832" stroke-width="1.4" opacity="0.8"/>
    <line x1="26" y1="6"  x2="26" y2="34" stroke="#7c6fbf" stroke-width="1.2" opacity="0.6"/>
    <line x1="10" y1="20" x2="42" y2="20" stroke="#8a9eaa" stroke-width="1.2" opacity="0.5"/>
    <circle cx="26" cy="6"  r="3.5" fill="#a8b832"/>
    <circle cx="10" cy="20" r="3"   fill="#d4cc3a"/>
    <circle cx="42" cy="20" r="3"   fill="#8a9eaa"/>
    <circle cx="26" cy="34" r="3"   fill="#7c6fbf"/>
    <circle cx="26" cy="20" r="2.5" fill="#5bbf7a"/>
    <circle cx="38" cy="10" r="2"   fill="#4a6abf"/>
  </svg>
  <div class="brand-text">
    <div class="rc">Meal Tracker</div>
  </div>
  <div class="nav-right">
    <strong>CADTH Ottawa 2026</strong>
    Sean Harrigan
  </div>
</nav>

<div class="hero">
  <h2>CADTH Conference<br>Ottawa 2026</h2>
  <p>Sean Harrigan &mdash; $95 daily budget &mdash; Tue Apr 21 through Fri Apr 24</p>
</div>

<!-- Per-day budget bars -->
<div class="budget-strip" id="budget-strip"></div>

<!-- Trip totals -->
<div class="summary">
  <div class="stat"><div class="stat-label">Total Spent</div><div class="stat-value" id="total">$0.00</div></div>
  <div class="stat"><div class="stat-label">Total Budget</div><div class="stat-value" id="budget-total" style="color:var(--muted)">$380.00</div></div>
  <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value" id="remaining">$380.00</div></div>
  <div class="stat"><div class="stat-label">Meals Logged</div><div class="stat-value" id="count">0</div></div>
</div>

<div class="main">
  <div class="add-bar">
    <button class="add-btn" id="toggle-add" type="button">+ Add Meal</button>
  </div>
  <form class="add-form" id="add-form">
    <div class="form-grid">
      <div class="form-field">
        <label for="f-day">Day</label>
        <select id="f-day" required></select>
      </div>
      <div class="form-field">
        <label for="f-meal">Meal</label>
        <select id="f-meal" required>
          <option>Breakfast</option>
          <option>Lunch</option>
          <option>Dinner</option>
          <option>Snack</option>
        </select>
      </div>
      <div class="form-field">
        <label for="f-location">Location</label>
        <input type="text" id="f-location" required placeholder="e.g. Metropolitain Brasserie">
      </div>
      <div class="form-field">
        <label for="f-cost">Cost (CAD)</label>
        <input type="number" id="f-cost" step="0.01" min="0" required placeholder="0.00" inputmode="decimal">
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn-secondary" id="cancel-add">Cancel</button>
      <button type="submit" class="add-btn">Save Meal</button>
    </div>
  </form>

  <div class="section-label">Expense Log</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-sort="day">Day<span class="sort-ind">↕</span></th>
          <th data-sort="meal">Meal<span class="sort-ind">↕</span></th>
          <th data-sort="location">Location<span class="sort-ind">↕</span></th>
          <th data-sort="cost">Cost (CAD)<span class="sort-ind">↕</span></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<div class="node-footer">
  <div class="nd" style="background:#a8b832"></div><div class="nl"></div>
  <div class="nd" style="background:#7c6fbf"></div><div class="nl"></div>
  <div class="nd" style="background:#d4cc3a"></div><div class="nl"></div>
  <div class="nd" style="background:#5bbf7a"></div><div class="nl"></div>
  <div class="nd" style="background:#8a9eaa"></div><div class="nl"></div>
  <div class="nd" style="background:#4a6abf"></div>
</div>
<footer>CADTH Ottawa 2026 &mdash; Sean Harrigan</footer>

<script>
const BUDGET = 95;
const DAYS = [
  { key: "Tue Apr 21", short: "Tue 21" },
  { key: "Wed Apr 22", short: "Wed 22" },
  { key: "Thu Apr 23", short: "Thu 23" },
  { key: "Fri Apr 24", short: "Fri 24" }
];

const STORAGE_KEY = 'ottawa-cadth-2026-meals';
const SEED = [
  { day: "Tue Apr 21", mealType: "Breakfast", location: "Air Canada AC342 (YVR→YOW)", cost: 13.60 }
];

function loadMeals() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return SEED.slice();
}
function saveMeals() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(meals)); } catch (e) {}
}

let meals = loadMeals();

const MEAL_ORDER = { Breakfast: 0, Lunch: 1, Dinner: 2, Snack: 3 };
const DAY_ORDER = {};
DAYS.forEach((d, i) => { DAY_ORDER[d.key] = i; });

// sort.col === null means "insertion order, newest first" (default)
let sort = { col: null, dir: 'desc' };
let recentlyAddedIdx = -1;

function sortedMeals() {
  const indexed = meals.map((m, i) => ({ ...m, _i: i }));
  if (!sort.col) {
    return indexed.sort((a, b) => b._i - a._i);
  }
  const cmp = {
    day:      (a, b) => (DAY_ORDER[a.day] ?? 99) - (DAY_ORDER[b.day] ?? 99),
    meal:     (a, b) => (MEAL_ORDER[a.mealType] ?? 99) - (MEAL_ORDER[b.mealType] ?? 99),
    location: (a, b) => a.location.localeCompare(b.location),
    cost:     (a, b) => a.cost - b.cost,
  }[sort.col];
  const factor = sort.dir === 'asc' ? 1 : -1;
  return indexed.sort((a, b) => cmp(a, b) * factor || a._i - b._i);
}

function render() {
  renderBudgetStrip();
  renderTable();
  renderStats();
}

function renderBudgetStrip() {
  const strip = document.getElementById('budget-strip');
  strip.innerHTML = '';
  DAYS.forEach(d => {
    const spent = meals.filter(m => m.day === d.key).reduce((s,m) => s + m.cost, 0);
    const remain = BUDGET - spent;
    const pct = Math.min((spent / BUDGET) * 100, 100);
    const cls = spent > BUDGET ? 'over' : spent > BUDGET * 0.8 ? 'warn' : 'ok';
    const fillCls = 'fill-' + cls;
    const div = document.createElement('div');
    div.className = 'day-budget';
    div.innerHTML = `
      <div class="db-label">Daily Budget</div>
      <div class="db-name">${d.short}</div>
      <div class="db-spent ${cls}">$${spent.toFixed(2)} <span style="font-weight:400;opacity:0.7">/ $${BUDGET}</span></div>
      <div class="db-remain">${remain >= 0 ? '$'+remain.toFixed(2)+' left' : '$'+Math.abs(remain).toFixed(2)+' over'}</div>
      <div class="progress-bar"><div class="progress-fill ${fillCls}" style="width:${pct}%"></div></div>`;
    strip.appendChild(div);
  });
}

function renderTable() {
  const tbody = document.getElementById('rows');
  tbody.innerHTML = '';
  if (!meals.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:48px;color:#7aada5;font-size:0.8rem">No meals logged yet — tap + Add Meal.</td></tr>';
    return;
  }
  sortedMeals().forEach(m => {
    const tr = document.createElement('tr');
    const cls = 'meal-' + m.mealType.toLowerCase();
    tr.dataset.idx = m._i;
    if (m._i === recentlyAddedIdx) tr.classList.add('just-added');
    tr.innerHTML = `
      <td class="day-tag">${esc(m.day)}</td>
      <td><span class="meal-badge ${cls}">${esc(m.mealType)}</span></td>
      <td class="location">${esc(m.location)}</td>
      <td class="cost">$${m.cost.toFixed(2)}</td>`;
    tbody.appendChild(tr);
  });
  const total = meals.reduce((s,m) => s + m.cost, 0);
  const tr = document.createElement('tr');
  tr.className = 'total-row';
  tr.innerHTML = `<td colspan="3">Total</td><td class="cost">$${total.toFixed(2)}</td>`;
  tbody.appendChild(tr);
}

function updateSortIndicators() {
  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    const col = th.dataset.sort;
    const ind = th.querySelector('.sort-ind');
    if (sort.col === col) {
      th.classList.add('active');
      ind.textContent = sort.dir === 'asc' ? '↑' : '↓';
    } else {
      th.classList.remove('active');
      ind.textContent = '↕';
    }
  });
}

function setSort(col) {
  if (sort.col === col) {
    sort.dir = sort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sort.col = col;
    sort.dir = 'asc';
  }
  updateSortIndicators();
  renderTable();
}

function initSort() {
  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => setSort(th.dataset.sort));
  });
  updateSortIndicators();
}

function renderStats() {
  const total = meals.reduce((s,m) => s + m.cost, 0);
  const tripBudget = BUDGET * DAYS.length;
  const remaining = tripBudget - total;
  document.getElementById('total').textContent = '$' + total.toFixed(2);
  document.getElementById('remaining').textContent = '$' + remaining.toFixed(2);
  document.getElementById('remaining').style.color = remaining < 0 ? 'var(--red)' : remaining < tripBudget * 0.2 ? 'var(--orange)' : 'var(--olive)';
  document.getElementById('count').textContent = meals.length;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function initForm() {
  const daySel = document.getElementById('f-day');
  DAYS.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.key;
    opt.textContent = d.key;
    daySel.appendChild(opt);
  });

  const todayAbbrev = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
  const todayMatch = DAYS.find(d => d.key.startsWith(todayAbbrev));
  if (todayMatch) daySel.value = todayMatch.key;

  const form = document.getElementById('add-form');
  const toggleBtn = document.getElementById('toggle-add');
  const cancelBtn = document.getElementById('cancel-add');

  toggleBtn.addEventListener('click', () => {
    form.classList.toggle('open');
    if (form.classList.contains('open')) document.getElementById('f-location').focus();
  });

  cancelBtn.addEventListener('click', () => {
    form.classList.remove('open');
    form.reset();
    if (todayMatch) daySel.value = todayMatch.key;
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const day = daySel.value;
    const mealType = document.getElementById('f-meal').value;
    const location = document.getElementById('f-location').value.trim();
    const cost = parseFloat(document.getElementById('f-cost').value);
    if (!day || !mealType || !location || !isFinite(cost)) return;
    meals.push({ day, mealType, location, cost });
    saveMeals();
    recentlyAddedIdx = meals.length - 1;
    form.classList.remove('open');
    form.reset();
    if (todayMatch) daySel.value = todayMatch.key;
    // re-render after the form starts collapsing so the highlight draws attention
    setTimeout(() => {
      render();
      setTimeout(() => { recentlyAddedIdx = -1; }, 1700);
    }, 150);
  });
}

initForm();
initSort();
render();
</script>

</body>
</html>
